name: Build & Release VenvStudio

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller Pillow
      - name: Build
        id: build1
        run: python build.py
        continue-on-error: true
      - name: Retry without windowed
        if: steps.build1.outcome == 'failure'
        run: python build.py --debug
      - uses: actions/upload-artifact@v4
        with:
          name: VenvStudio-Windows
          path: dist/VenvStudio.exe
          if-no-files-found: warn

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller Pillow
      - name: Build (ARM64)
        run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: VenvStudio-macOS-arm64
          path: dist/VenvStudio
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 pyinstaller Pillow
      - name: Build
        run: python build.py
      - uses: actions/upload-artifact@v4
        with:
          name: VenvStudio-macOS
          path: dist/VenvStudio
          if-no-files-found: warn

  build-linux-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 libegl1 \
            libxcb-icccm4 libxkbcommon-x11-0 libxcb-keysyms1 libxcb-image0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-randr0 \
            libxcb-sync1 libxcb-shm0 fuse libfuse2

      - name: Install Python deps
        run: |
          pip install PySide6 pyinstaller Pillow

      - name: Build with PyInstaller (onedir for AppImage)
        run: python build.py --onedir

      - name: Create AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r dist/VenvStudio/* AppDir/usr/bin/

          # ── Bundle a minimal, self-contained fontconfig config ──
          # The host's /etc/fonts/conf.d may use a newer fontconfig syntax
          # (<const xsi:nil/>) that the bundled libfontconfig can't parse,
          # which stalls font enumeration and freezes startup. This minimal
          # config only declares standard system font dirs + a cache dir and
          # pulls in the host's local.conf if present, without sourcing the
          # incompatible conf.d. AppRun points FONTCONFIG_FILE at this.
          mkdir -p AppDir/usr/bin/_internal/etc/fonts
          cat > AppDir/usr/bin/_internal/etc/fonts/fonts.conf << 'FONTSCONF'
          <?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <dir>/usr/share/fonts</dir>
            <dir>/usr/local/share/fonts</dir>
            <dir prefix="xdg">fonts</dir>
            <dir>~/.fonts</dir>
            <cachedir prefix="xdg">fontconfig</cachedir>
            <cachedir>~/.fontconfig</cachedir>
            <config></config>
          </fontconfig>
          FONTSCONF
          sed -i 's/^          //' AppDir/usr/bin/_internal/etc/fonts/fonts.conf

          cat > AppDir/usr/share/applications/venvstudio.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=VenvStudio
          Comment=Python Virtual Environment Manager
          Exec=VenvStudio
          Icon=venvstudio
          Type=Application
          Categories=Development;IDE;
          Keywords=python;venv;virtualenv;
          DESKTOP
          sed -i 's/^          //' AppDir/usr/share/applications/venvstudio.desktop

          if [ -f assets/icon.png ]; then
            cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/venvstudio.png
            cp assets/icon.png AppDir/venvstudio.png
          fi

          cp AppDir/usr/share/applications/venvstudio.desktop AppDir/venvstudio.desktop

          # ── apprun-hook for linuxdeploy ──
          # linuxdeploy generates its own AppRun and sources any scripts in
          # AppDir/apprun-hooks/ at launch. We set the same env here so the
          # PRIMARY (linuxdeploy) AppImage also forces xcb and the bundled
          # fontconfig — not just the appimagetool fallback below.
          mkdir -p AppDir/apprun-hooks
          cat > AppDir/apprun-hooks/linuxdeploy-venvstudio-env.sh << 'HOOK'
          #!/bin/bash
          export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
          export QT_ENABLE_HIGHDPI_SCALING="${QT_ENABLE_HIGHDPI_SCALING:-1}"
          for _fc in \
            "${APPDIR}/usr/bin/_internal/etc/fonts/fonts.conf" \
            "${APPDIR}/usr/bin/etc/fonts/fonts.conf" \
            "${APPDIR}/etc/fonts/fonts.conf"; do
            if [ -f "${_fc}" ]; then
              export FONTCONFIG_FILE="${_fc}"
              export FONTCONFIG_PATH="$(dirname "${_fc}")"
              break
            fi
          done
          HOOK
          sed -i 's/^          //' AppDir/apprun-hooks/linuxdeploy-venvstudio-env.sh
          chmod +x AppDir/apprun-hooks/linuxdeploy-venvstudio-env.sh

          export LDAI_UPDATE_INFORMATION="zsync|https://github.com/${{ github.repository }}/releases/latest/download/VenvStudio-x86_64.AppImage.zsync"
          DEPLOY_GTK_VERSION=3 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/VenvStudio \
            --desktop-file AppDir/usr/share/applications/venvstudio.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/venvstudio.png \
            --output appimage || true

          if ! ls VenvStudio*.AppImage 1>/dev/null 2>&1; then
            echo "linuxdeploy failed, trying appimagetool..."
            wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage

            cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export QT_PLUGIN_PATH="${HERE}/usr/bin/PySide6/Qt/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="${HERE}/usr/bin/PySide6/Qt/plugins/platforms"
          # Force the xcb platform plugin — without this Qt may pick an
          # unavailable backend and hang before the window appears.
          export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"
          # Some hosts ship a newer fontconfig config syntax (e.g. <const xsi:nil/>)
          # than the libfontconfig bundled here can parse. When the host
          # /etc/fonts files fail to load, fontconfig can stall during font
          # enumeration and the app never draws its first window. If the AppImage
          # ships its own fontconfig config, point fontconfig at it so we never
          # read the (possibly incompatible) host /etc/fonts. We only override
          # when a bundled config actually exists, so normal hosts are untouched.
          for _fc in \
            "${HERE}/usr/bin/_internal/etc/fonts/fonts.conf" \
            "${HERE}/usr/bin/etc/fonts/fonts.conf" \
            "${HERE}/etc/fonts/fonts.conf"; do
            if [ -f "${_fc}" ]; then
              export FONTCONFIG_FILE="${_fc}"
              export FONTCONFIG_PATH="$(dirname "${_fc}")"
              break
            fi
          done
          # High-DPI defaults (harmless if already set by the app)
          export QT_ENABLE_HIGHDPI_SCALING="${QT_ENABLE_HIGHDPI_SCALING:-1}"
          exec "${HERE}/usr/bin/VenvStudio" "$@"
          APPRUN
            sed -i 's/^          //' AppDir/AppRun
            chmod +x AppDir/AppRun
            ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir VenvStudio-x86_64.AppImage
          fi

          ls -la *.AppImage 2>/dev/null || echo "No AppImage created"

      - name: Smoke-test AppImage (headless)
        run: |
          set +e
          sudo apt-get install -y xvfb strace >/dev/null 2>&1
          APP=$(ls VenvStudio*.AppImage 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No AppImage to test"
            exit 0
          fi
          chmod +x "$APP"

          echo "==================== TEST 1: AppImage direct (xvfb) ===================="
          PYTHONFAULTHANDLER=1 xvfb-run -a timeout -s SIGABRT 30 "./$APP" > /tmp/t1.log 2>&1
          echo "exit=$?"
          tail -40 /tmp/t1.log || true

          echo "==================== Extract + inspect ===================="
          "./$APP" --appimage-extract >/dev/null 2>&1
          echo "--- fonts.conf present? ---"
          find squashfs-root -name fonts.conf
          echo "--- main binary ldd (missing libs?) ---"
          ldd squashfs-root/usr/bin/VenvStudio 2>&1 | grep -i "not found" || echo "(no missing libs reported)"

          echo "==================== TEST 2: direct binary, xvfb, faulthandler ===================="
          export APPDIR="$PWD/squashfs-root"
          export FONTCONFIG_FILE="$APPDIR/usr/bin/_internal/etc/fonts/fonts.conf"
          export QT_QPA_PLATFORM=xcb
          export QT_DEBUG_PLUGINS=1
          PYTHONFAULTHANDLER=1 xvfb-run -a timeout -s SIGABRT 30 \
            ./squashfs-root/usr/bin/VenvStudio > /tmp/t2.log 2>&1
          echo "exit=$?"
          echo "--- t2 tail (non-fontconfig) ---"
          grep -av "Fontconfig" /tmp/t2.log | tail -50 || true

          echo "==================== TEST 3: strace last syscalls ===================="
          # Capture where it blocks at the syscall level (futex/read/poll = deadlock)
          xvfb-run -a timeout -s SIGKILL 20 \
            strace -f -e trace=network,desc,futex -o /tmp/strace.log \
            ./squashfs-root/usr/bin/VenvStudio > /dev/null 2>&1
          echo "--- last 30 strace lines ---"
          tail -30 /tmp/strace.log 2>/dev/null || echo "(no strace output)"

          echo "==================== verdict ===================="
          if grep -q "MainWindow.__init__ complete\|entering event loop" /tmp/t1.log /tmp/t2.log; then
            echo "✅ reached event loop"
          else
            echo "::warning::startup hang reproduced in CI (see logs above)"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: VenvStudio-Linux-AppImage
          path: VenvStudio*.AppImage
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        with:
          name: VenvStudio-Linux
          path: dist/VenvStudio/VenvStudio
          if-no-files-found: warn

  release:
    needs: [build-windows, build-macos, build-linux-appimage]
    runs-on: ubuntu-latest
    if: always() && startsWith(github.ref, 'refs/tags/v') && needs.build-windows.result == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get categorized changelog
        id: changelog
        run: |
          set +e
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "${{ github.ref_name }}" | head -n1)
          set -e

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, using all commits"
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            echo "Previous tag: $PREV_TAG"
            COMMITS=$(git log --pretty=format:"%s" ${PREV_TAG}..HEAD)
          fi

          # Filter out release commits
          COMMITS=$(echo "$COMMITS" | grep -v "^release:" || true)

          # Categorize commits
          FEATURES=$(echo "$COMMITS" | grep -i "^feat:" | sed 's/^feat:\s*//' | sed 's/^/- /' || true)
          FIXES=$(echo "$COMMITS" | grep -i "^fix:" | sed 's/^fix:\s*//' | sed 's/^/- /' || true)
          IMPROVEMENTS=$(echo "$COMMITS" | grep -iE "^(chore|refactor|build|ci|perf|style|docs):" | sed 's/^[a-zA-Z]*:\s*//' | sed 's/^/- /' || true)
          OTHERS=$(echo "$COMMITS" | grep -ivE "^(feat|fix|chore|refactor|build|ci|perf|style|docs|release):" | sed 's/^/- /' || true)

          # Build changelog body
          BODY=""
          if [ -n "$FEATURES" ] && [ "$FEATURES" != "- " ]; then
            BODY="${BODY}### ✨ New Features\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ] && [ "$FIXES" != "- " ]; then
            BODY="${BODY}### 🐛 Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$IMPROVEMENTS" ] && [ "$IMPROVEMENTS" != "- " ]; then
            BODY="${BODY}### 🔧 Improvements\n${IMPROVEMENTS}\n\n"
          fi
          if [ -n "$OTHERS" ] && [ "$OTHERS" != "- " ]; then
            BODY="${BODY}### 📌 Other Changes\n${OTHERS}\n\n"
          fi

          # Fallback if all empty
          if [ -z "$BODY" ]; then
            BODY="- Maintenance release\n"
          fi

          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Prepare files & sizes
        id: sizes
        continue-on-error: true
        run: |
          ls -laR
          # Rename macOS binary
          mv VenvStudio-macOS/VenvStudio VenvStudio-macOS/VenvStudio-macOS 2>/dev/null || true

          # Calculate file sizes for release notes
          WIN_SIZE=$(du -sh VenvStudio-Windows/VenvStudio.exe 2>/dev/null | cut -f1 || echo "—")
          MAC_SIZE=$(du -sh VenvStudio-macOS/VenvStudio-macOS 2>/dev/null | cut -f1 || echo "—")
          LNX_SIZE=$(du -sh VenvStudio-Linux-AppImage/VenvStudio*.AppImage 2>/dev/null | cut -f1 || echo "—")

          echo "win_size=$WIN_SIZE" >> $GITHUB_OUTPUT
          echo "mac_size=$MAC_SIZE" >> $GITHUB_OUTPUT
          echo "lnx_size=$LNX_SIZE" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VenvStudio-Windows/VenvStudio.exe
            VenvStudio-Linux-AppImage/VenvStudio*.AppImage
            VenvStudio-macOS/VenvStudio-macOS
          body: |
            <div align="center">

            # 🐍 VenvStudio ${{ github.ref_name }}

            **Lightweight Python Virtual Environment Manager**

            [![PyPI](https://img.shields.io/badge/PyPI-${{ github.ref_name }}-a6e3a1?style=flat-square&logo=pypi&logoColor=white)](https://pypi.org/project/venvstudio/)
            [![License](https://img.shields.io/badge/License-LGPL--3.0-cba6f7?style=flat-square)](https://github.com/bayramkotan/VenvStudio/blob/main/LICENSE)
            [![Python](https://img.shields.io/badge/Python-3.9%2B-89b4fa?style=flat-square&logo=python&logoColor=white)](https://python.org)

            </div>

            ---

            ## 📋 What's Changed

            ${{ steps.changelog.outputs.changes }}

            ---

            ## 📥 Downloads

            | Platform | File | Size | Notes |
            |:--------:|:-----|:----:|:------|
            | 🪟 **Windows** x64 | `VenvStudio.exe` | ${{ steps.sizes.outputs.win_size }} | Portable — no install needed |
            | 🐧 **Linux** x64 | `VenvStudio-x86_64.AppImage` | ${{ steps.sizes.outputs.lnx_size }} | `chmod +x` then run |
            | 🍎 **macOS** ARM64 | `VenvStudio-macOS` | ${{ steps.sizes.outputs.mac_size }} | Apple Silicon + Rosetta 2 |
            | 📦 **PyPI** | `pip install venvstudio` | — | `pip install --upgrade venvstudio` |

            ---

            <div align="center">

            ⭐ **If VenvStudio helps you, consider [giving it a star](https://github.com/bayramkotan/VenvStudio)!** ⭐

            [📖 Documentation](https://github.com/bayramkotan/VenvStudio#readme) · [🐛 Report Bug](https://github.com/bayramkotan/VenvStudio/issues) · [💡 Request Feature](https://github.com/bayramkotan/VenvStudio/issues)

            </div>
          fail_on_unmatched_files: false

  publish-pypi:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: |
          mv build.py _pyinstaller_build.py.bak
          python -m build
          mv _pyinstaller_build.py.bak build.py

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
